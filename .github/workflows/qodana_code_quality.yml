# Disabled: Qodana Cloud token is expired/invalid.
# Re-enable once a valid QODANA_TOKEN secret is configured.
name: Qodana
on:
  workflow_dispatch:

jobs:
  qodana:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2024.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
